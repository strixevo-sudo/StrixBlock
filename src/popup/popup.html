<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrixBlock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --bg3: #0f3460;
      --accent: #e94560;
      --accent2: #9147ff;
      --text: #e8e8e8;
      --text2: #a0a0b0;
      --success: #2ecc71;
      --warning: #f39c12;
      --danger: #e74c3c;
      --border: rgba(255,255,255,0.08);
      --radius: 8px;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      color: var(--accent);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .version-badge {
      font-size: 10px;
      color: var(--text2);
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 10px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }
    .status-dot.inactive { background: var(--danger); }

    /* Current site section */
    .site-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .site-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .site-domain {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .site-label {
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 38px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--success);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .toggle-label {
      font-size: 12px;
      color: var(--text2);
    }

    .toggle-label.enabled { color: var(--success); }
    .toggle-label.disabled { color: var(--danger); }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--bg);
      padding: 10px 14px;
      text-align: center;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    /* Update banner */
    .update-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(243, 156, 18, 0.15);
      border-bottom: 1px solid rgba(243, 156, 18, 0.3);
      font-size: 11px;
      color: var(--warning);
    }

    .update-banner.visible { display: flex; }

    .update-banner a {
      color: var(--warning);
      margin-left: auto;
      text-decoration: underline;
      cursor: pointer;
    }

    /* Footer */
    .footer {
      padding: 10px 14px;
    }

    .btn-dashboard {
      width: 100%;
      padding: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: center;
    }

    .btn-dashboard:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.15);
    }

    /* Disabled state */
    body.ext-disabled .site-section,
    body.ext-disabled .stats-row {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Loading state */
    .loading {
      color: var(--text2);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">■</div>
    <div class="title">StrixBlock</div>
    <div class="version-badge" id="versionBadge">v2.0.0</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="site-section">
    <div class="site-label">Current Site</div>
    <div class="site-row">
      <div class="site-domain" id="siteDomain">Loading…</div>
      <label class="toggle" id="siteToggleWrap" title="Toggle protection for this site">
        <input type="checkbox" id="siteToggle" checked>
        <div class="toggle-slider"></div>
      </label>
      <span class="toggle-label enabled" id="toggleLabel">Protected</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="totalBlocked">0</div>
      <div class="stat-label">Blocked (All Time)</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="pageBlocked">0</div>
      <div class="stat-label">This Page</div>
    </div>
  </div>

  <div class="update-banner" id="updateBanner">
    <span>⚡ Update available</span>
    <a id="updateLink" href="#" target="_blank" rel="noopener">View →</a>
  </div>

  <div class="footer">
    <button class="btn-dashboard" id="dashboardBtn">Open Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
